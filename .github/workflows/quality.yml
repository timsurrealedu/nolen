name: Quality

on:
  push:
  pull_request:

jobs:
  test-and-ml-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run ml:pipeline
      - run: npm run evaluate:challenge
