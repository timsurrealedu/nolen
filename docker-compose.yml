services:
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_PASSWORD_FILE: /run/secrets/postgres_admin_password, POSTGRES_DB: nolen }
    secrets: [postgres_admin_password, postgres_event_store_password, postgres_detection_password, postgres_incident_store_password, postgres_api_password]
    volumes:
      - ./infrastructure/postgres/001_event_idempotency.sql:/docker-entrypoint-initdb.d/001_event_idempotency.sql:ro
      - ./infrastructure/postgres/002_detection_and_incidents.sql:/docker-entrypoint-initdb.d/002_detection_and_incidents.sql:ro
      - ./infrastructure/postgres/003_incidents.sql:/docker-entrypoint-initdb.d/003_incidents.sql:ro
      - ./infrastructure/postgres/init-identities.sh:/docker-entrypoint-initdb.d/004_identities.sh:ro
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U postgres"], interval: 5s, timeout: 3s, retries: 10 }
    ports: ["5432:5432"]
  nats:
    image: nats:2.10-alpine
    entrypoint: ["/bin/sh", "/opt/nolen/start.sh"]
    secrets: [nats_admin_password, nats_ingestion_password, nats_event_store_password, nats_detection_password, nats_incident_store_password, nats_api_password]
    volumes:
      - ./infrastructure/nats/nats.conf:/etc/nats/nats.conf:ro
      - ./infrastructure/nats/start.sh:/opt/nolen/start.sh:ro
    ports: ["4222:4222", "8222:8222"]
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    entrypoint: ["/bin/sh", "/opt/nolen/start.sh"]
    secrets: [clickhouse_admin_password, clickhouse_event_store_password, clickhouse_api_password]
    volumes:
      - ./infrastructure/clickhouse/001_security_events.sql:/docker-entrypoint-initdb.d/001_security_events.sql:ro
      - ./infrastructure/clickhouse/init-identities.sh:/docker-entrypoint-initdb.d/002_identities.sh:ro
      - ./infrastructure/clickhouse/start.sh:/opt/nolen/start.sh:ro
    healthcheck: { test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping"], interval: 5s, timeout: 3s, retries: 10 }
    ports: ["8123:8123", "9000:9000"]

secrets:
  postgres_admin_password: { file: ./secrets/postgres_admin_password }
  postgres_event_store_password: { file: ./secrets/postgres_event_store_password }
  postgres_detection_password: { file: ./secrets/postgres_detection_password }
  postgres_incident_store_password: { file: ./secrets/postgres_incident_store_password }
  postgres_api_password: { file: ./secrets/postgres_api_password }
  clickhouse_admin_password: { file: ./secrets/clickhouse_admin_password }
  clickhouse_event_store_password: { file: ./secrets/clickhouse_event_store_password }
  clickhouse_api_password: { file: ./secrets/clickhouse_api_password }
  nats_admin_password: { file: ./secrets/nats_admin_password }
  nats_ingestion_password: { file: ./secrets/nats_ingestion_password }
  nats_event_store_password: { file: ./secrets/nats_event_store_password }
  nats_detection_password: { file: ./secrets/nats_detection_password }
  nats_incident_store_password: { file: ./secrets/nats_incident_store_password }
  nats_api_password: { file: ./secrets/nats_api_password }
