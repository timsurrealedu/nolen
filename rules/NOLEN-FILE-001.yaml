id: NOLEN-FILE-001
name: Sensitive Security File Access or Modification
severity: high
matches:
  - event.action: access
    file.path_prefix: [/etc/shadow, /etc/sudoers, /home/*/.ssh/authorized_keys]
  - event.action: modify
    file.path_prefix: [/etc/shadow, /etc/sudoers, /etc/cron, /home/*/.ssh/authorized_keys]
mitre: { tactic: credential-access, technique: T1003 }
