id: NOLEN-SSH-002
name: Repeated Invalid SSH User Attempts
severity: medium
match:
  event.category: authentication
  event.action: invalid_user
  service.name: ssh
group_by: [source.ip, host.id]
condition: { count: 5, within: 60s }
# Unmapped in MVP: this is an SSH account-enumeration precursor signal, not
# exploitation of a public-facing application.
