id: NOLEN-SSH-003
name: SSH Brute Force (Unknown User)
severity: high
match:
  event.category: authentication
  event.action: login
  event.result: failure
  service.name: ssh
absent: [user.name]
group_by: [source.ip, host.id]
condition: { count: 10, within: 60s }
mitre: { tactic: credential-access, technique: T1110 }
