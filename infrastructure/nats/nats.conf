jetstream { store_dir: /data/jetstream }
authorization {
  users: [
    { user: admin, password: $NATS_ADMIN_PASSWORD, permissions: { publish: ">", subscribe: ">" } },
    { user: ingestion, password: $NATS_INGESTION_PASSWORD, permissions: { publish: ["events.raw", "$JS.API.PUB.events.raw", "_INBOX.>"], subscribe: "_INBOX.>" } },
    { user: event_store, password: $NATS_EVENT_STORE_PASSWORD, permissions: { publish: ["$JS.API.CONSUMER.INFO.NOLEN_EVENTS.event-store", "$JS.API.CONSUMER.MSG.NEXT.NOLEN_EVENTS.event-store", "$JS.ACK.NOLEN_EVENTS.>", "_INBOX.>"], subscribe: ["events.raw", "_INBOX.>"] } },
    { user: detection, password: $NATS_DETECTION_PASSWORD, permissions: { publish: ["incidents.created", "$JS.API.PUB.incidents.created", "$JS.API.CONSUMER.INFO.NOLEN_EVENTS.detection-engine", "$JS.API.CONSUMER.MSG.NEXT.NOLEN_EVENTS.detection-engine", "$JS.ACK.NOLEN_EVENTS.>", "_INBOX.>"], subscribe: ["events.raw", "_INBOX.>"] } },
    { user: incident_store, password: $NATS_INCIDENT_STORE_PASSWORD, permissions: { publish: ["$JS.API.CONSUMER.INFO.NOLEN_INCIDENTS.incident-store", "$JS.API.CONSUMER.MSG.NEXT.NOLEN_INCIDENTS.incident-store", "$JS.ACK.NOLEN_INCIDENTS.>", "_INBOX.>"], subscribe: ["incidents.created", "_INBOX.>"] } },
    { user: api, password: $NATS_API_PASSWORD, permissions: { publish: ["$JS.API.CONSUMER.INFO.NOLEN_INCIDENTS.api-incident-delivery", "$JS.API.CONSUMER.MSG.NEXT.NOLEN_INCIDENTS.api-incident-delivery", "$JS.API.CONSUMER.INFO.NOLEN_INCIDENTS.console-incident-delivery", "$JS.API.CONSUMER.MSG.NEXT.NOLEN_INCIDENTS.console-incident-delivery", "$JS.ACK.NOLEN_INCIDENTS.>", "_INBOX.>"], subscribe: ["incidents.created", "_INBOX.>"] } }
  ]
}
